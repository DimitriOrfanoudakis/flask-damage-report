<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defektmeldung erfolgreich</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .success-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border: 2px solid #28a745;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .success-container h1 {
            color: #155724;
            margin-top: 0;
            text-align: center;
            font-size: 28px;
        }

        .success-container h2 {
            color: #155724;
            border-bottom: 2px solid #28a745;
            padding-bottom: 10px;
            margin-top: 30px;
            font-size: 18px;
        }

        .success-container h2:first-of-type {
            margin-top: 0;
        }

        .details-list {
            list-style: none;
            padding: 0;
        }

        .details-list li {
            padding: 12px 0;
            border-bottom: 1px solid rgba(40, 167, 69, 0.3);
            font-size: 16px;
        }

        .details-list li:last-child {
            border-bottom: none;
        }

        .details-list strong {
            color: #155724;
            font-weight: 600;
            display: inline-block;
            width: 150px;
        }

        .button-container {
            text-align: center;
            margin-top: 30px;
        }

        .button-container a {
            display: inline-block;
            padding: 12px 30px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .button-container a:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <h1>✓ Defektmeldung erfolgreich gespeichert!</h1>
        
        <h2>Eingereichte Daten:</h2>
        
        <ul class="details-list">
            <li>
                <strong>Mitarbeiter-ID:</strong>
                {{ employee_id }}
            </li>
            <li>
                <strong>Gerätetyp:</strong>
                {{ device_type }}
            </li>
            <li>
                <strong>Schadensdatum:</strong>
                {{ damage_date }}
            </li>
            <li>
                <strong>Beschreibung:</strong>
                {{ description }}
            </li>
            <li>
                <strong>Dringlichkeit:</strong>
                {{ urgency }}
            </li>
        </ul>

        <div class="button-container">
            <a href="/">← Weitere Meldung erfassen</a>
        </div>
    </div>
</body>
</html>
